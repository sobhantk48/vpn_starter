name: vpn_starter
description: EasySNI-like Flutter VPN skeleton
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  equatable: ^2.0.5
  dio: ^5.7.0
  path_provider: ^2.1.5
  package_info_plus: ^8.1.0
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  collection: ^1.18.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
