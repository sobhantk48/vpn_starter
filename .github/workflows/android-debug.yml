name: Android Debug Build (Flutter)

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
      - 'feat/**'
  pull_request:
  workflow_dispatch:

jobs:
  android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          echo "Checking required project files..."
          test -f pubspec.yaml || (echo "pubspec.yaml not found" && exit 1)
          test -f android/app/build.gradle.kts || (echo "android/app/build.gradle.kts not found" && exit 1)

          # اگر libbox.aar نیازیه، باید داخل ریپو باشه
          if [ ! -f android/app/libs/libbox.aar ]; then
            echo "ERROR: android/app/libs/libbox.aar not found in repository"
            echo "If your app depends on it, commit it with: git add -f android/app/libs/libbox.aar"
            exit 1
          fi

      - name: Remove conflicting Gradle file (Groovy)
        run: |
          rm -f android/app/build.gradle
          echo "Remaining gradle files in android/app:"
          ls -la android/app | grep build.gradle || true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Environment info
        run: |
          echo "PWD=$(pwd)"
          java -version
          flutter --version
          flutter doctor -v

      - name: Flutter pub get (verbose)
        run: flutter pub get -v

      - name: Build debug APK (verbose)
        run: flutter build apk --debug --verbose

      - name: Show output tree (always)
        if: always()
        run: |
          echo "=== APK files ==="
          find . -type f -name "*.apk" -print || true
          echo "=== build/app/outputs ==="
          ls -R build/app/outputs || true
          echo "=== android/app/build/outputs ==="
          ls -R android/app/build/outputs || true

      - name: Upload APK artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          if-no-files-found: warn
          path: |
            build/app/outputs/flutter-apk/*.apk
            android/app/build/outputs/**/*.apk

      - name: Upload logs (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          if-no-files-found: warn
          path: |
            **/.dart_tool/**
            **/build/**/reports/**
