name: Android Debug Build

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          java -version
          flutter --version
          flutter doctor -v

      - name: Clean duplicate Gradle settings file if present
        run: |
          rm -f android/settings.gradle.kts
          ls -la android

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build debug apk
        run: flutter build apk --debug

      - name: List APK outputs
        if: always()
        run: |
          echo "=== find build *.apk ==="
          find build -type f | grep -i '\.apk$' || true
          echo "=== find android *.apk ==="
          find android -type f | grep -i '\.apk$' || true
          echo "=== build/app/outputs ==="
          ls -R build/app/outputs || true
          echo "=== android/app/build/outputs ==="
          ls -R android/app/build/outputs || true

      - name: Upload APK artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          if-no-files-found: warn
          path: |
            build/app/outputs/flutter-apk/*.apk
            android/app/build/outputs/**/*.apk
