name: Android Debug Build

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Show environment
        run: |
          echo "PWD=$(pwd)"
          java -version
          flutter --version
          flutter doctor -v

      - name: Inspect repository root
        run: |
          ls -la
          echo "=== android ==="
          ls -la android || true
          echo "=== android/app ==="
          ls -la android/app || true

      - name: Remove duplicate Gradle settings file if present
        run: |
          rm -f android/settings.gradle.kts
          echo "=== android after cleanup ==="
          ls -la android

      - name: Clean Flutter project
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build debug APK
        continue-on-error: true
        run: |
          flutter build apk --debug --verbose

      - name: Inspect Flutter build outputs
        if: always()
        run: |
          echo "=== find any *.apk in repo ==="
          find . -type f -name "*.apk" -print || true

          echo "=== build/app/outputs ==="
          ls -R build/app/outputs || true

          echo "=== android/app/build/outputs ==="
          ls -R android/app/build/outputs || true

          echo "=== build dir tree (top 6 levels) ==="
          find build -maxdepth 6 -type f | sort || true

          echo "=== android/app/build dir tree (top 8 levels) ==="
          find android/app/build -maxdepth 8 -type f | sort || true

      - name: Fail if no APK exists
        if: always()
        run: |
          if [ -z "$(find . -type f -name "*.apk" -print -quit)" ]; then
            echo "Error: No APK file found anywhere in repository."
            exit 1
          else
            echo "APK found successfully."
          fi

      - name: Upload APK artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          if-no-files-found: warn
          path: |
            **/*.apk
