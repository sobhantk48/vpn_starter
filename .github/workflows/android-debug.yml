name: Android Debug Build

on:
  push:
    branches:
      - main
      - master
      - develop
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  android-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Show environment
        run: |
          echo "PWD=$(pwd)"
          java -version
          flutter --version
          flutter doctor -v

      - name: Clean Flutter project
        run: flutter clean

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build debug APK (capture full logs)
        id: build_apk
        continue-on-error: true
        run: |
          set -o pipefail
          flutter build apk --debug --verbose 2>&1 | tee flutter_build.log
          echo "build_exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Print Kotlin/Gradle error summary
        if: always()
        run: |
          echo "=== Kotlin/Gradle important lines ==="
          grep -nE "e: |Compilation error|What went wrong|FAILURE: Build failed|error:|Exception|Caused by:" flutter_build.log | tail -n 300 || true

      - name: Inspect APK outputs
        if: always()
        run: |
          echo "=== find any *.apk in repo ==="
          find . -type f -name "*.apk" -print || true

          echo "=== build/app/outputs ==="
          ls -R build/app/outputs || true

          echo "=== android/app/build/outputs ==="
          ls -R android/app/build/outputs || true

      - name: Upload logs and APK artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-logs-and-apk
          if-no-files-found: warn
          path: |
            flutter_build.log
            **/*.apk

      - name: Fail if build failed
        if: always()
        run: |
          if [ "${{ steps.build_apk.outputs.build_exit }}" != "0" ]; then
            echo "Build failed (exit=${{ steps.build_apk.outputs.build_exit }}). See flutter_build.log artifact."
            exit 1
          fi

      - name: Fail if APK missing
        if: always()
        run: |
          if [ -z "$(find . -type f -name "*.apk" -print -quit)" ]; then
            echo "Build succeeded but no APK found."
            exit 1
          else
            echo "APK found successfully."
          fi
